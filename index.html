<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account Maker</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h1>Criar Conta</h1>

<form id="form">

<div class="mb-3">
<label>Nome</label>
<input type="text" id="nome" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Telefone</label>
<input type="tel" id="telefone" class="form-control" required>
</div>

<div class="mb-3">
<label>Morada</label>
<input type="text" id="morada" class="form-control" required>
</div>

<div class="mb-3">
<label>NIF</label>
<input type="number" id="nif" class="form-control" required>
</div>

<div class="mb-3">
<label>Observações</label>
<textarea id="obs" class="form-control"></textarea>
</div>

<button class="btn btn-primary">Criar Conta</button>

</form>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
